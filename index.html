<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goob Horizon - Full Simulation Upgrade</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #minimap_canvas {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 220px;
            height: 220px;
            border: 3px solid rgba(255, 255, 255, 0.6);
            background-color: rgba(10, 25, 10, 0.85);
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">SPEED: <span id="speed">0</span> MPH<br><span id="airtime" style="font-size: 16px; color: #ffcc00; display: none;">BIG AIR!</span></div>
    <canvas id="minimap_canvas" width="220" height="220"></canvas>
    
    <script>
        // --- 1. SETUP ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x66CCFF);
        document.body.appendChild(renderer.domElement);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
        sunLight.position.set(50, 150, 50);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x606060));

        // --- 2. HUGE MAP & HILL GENERATION ---
        const WORLD_SIZE = 2000; // Map doubled in size
        const MAP_SCALE = 220 / WORLD_SIZE; 
        const MAP_CENTER = 110;

        function getHeight(x, z) {
            const hill1 = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 25; 
            const hill2 = Math.sin(x * 0.005 + z * 0.01) * 12;
            return hill1 + hill2;
        }

        const groundGeom = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 150, 150);
        groundGeom.rotateX(-Math.PI / 2);

        const vertices = groundGeom.attributes.position.array;
        for (let i = 0; i < vertices.length; i += 3) {
            vertices[i + 1] = getHeight(vertices[i], vertices[i + 2]);
        }
        groundGeom.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, flatShading: true, roughness: 0.85 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        scene.add(ground);

        // --- 3. POPULATE COLLIDABLE TREES ---
        const trees = [];
        const TREE_COUNT = 450;
        const COLLISION_RADIUS = 2.2; // Distance buffer to trigger hit
        
        const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3d28, roughness: 0.9 });
        const treeLeavesMat = new THREE.MeshStandardMaterial({ color: 0x1e5c1e, flatShading: true, roughness: 0.7 });

        for (let i = 0; i < TREE_COUNT; i++) {
            const x = (Math.random() - 0.5) * WORLD_SIZE * 0.95;
            const z = (Math.random() - 0.5) * WORLD_SIZE * 0.95;
            const y = getHeight(x, z);
            
            const treeGroup = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.9, 6, 5), treeTrunkMat);
            trunk.position.y = 3;
            treeGroup.add(trunk);
            
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(3.5, 10, 5), treeLeavesMat);
            leaves.position.y = 9;
            treeGroup.add(leaves);
            
            treeGroup.position.set(x, y, z);
            scene.add(treeGroup);
            
            // Save collision coordinate metadata
            trees.push({ x: x, z: z, radius: COLLISION_RADIUS });
        }

        // --- 4. DETAILED SPORTS CAR MODEL ---
        const car = new THREE.Group();
        const carChassisContainer = new THREE.Group();
        
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff1133, metalness: 0.7, roughness: 0.2 });
        const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });

        // Base Chassis Frame
        const bodyBase = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.5, 4.4), bodyMat);
        bodyBase.position.y = 0.4;
        carChassisContainer.add(bodyBase);

        // Aerodynamic Hood/Spoilers decoration
        const hood = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.3, 1.8), bodyMat);
        hood.position.set(0, 0.6, 1.2);
        carChassisContainer.add(hood);

        // Roof Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 1.8), cabinMat);
        cabin.position.set(0, 0.9, -0.4);
        carChassisContainer.add(cabin);

        // Build 4 Independent Wheels for Rolling Animation
        const wheelGeom = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 12);
        wheelGeom.rotateZ(Math.PI / 2); // Orient cylinders sideways
        
        const frontLeftWheel = new THREE.Mesh(wheelGeom, wheelMat);
        frontLeftWheel.position.set(1.2, 0.35, 1.3);
        
        const frontRightWheel = new THREE.Mesh(wheelGeom, wheelMat);
        frontRightWheel.position.set(-1.2, 0.35, 1.3);
        
        const rearLeftWheel = new THREE.Mesh(wheelGeom, wheelMat);
        rearLeftWheel.position.set(1.2, 0.35, -1.3);
        
        const rearRightWheel = new THREE.Mesh(wheelGeom, wheelMat);
        rearRightWheel.position.set(-1.2, 0.35, -1.3);

        carChassisContainer.add(frontLeftWheel, frontRightWheel, rearLeftWheel, rearRightWheel);
        car.add(carChassisContainer);
        scene.add(car);
        
        camera.position.set(0, 5, -12);

        // --- 5. PHYSICS & SPEED SETTINGS ---
        let speed = 0, rotation = 0;
        let verticalVelocity = 0; 
        
        const MAX_SPEED = 1.4;       
        const ACCELERATION = 0.0025; 
        const GRAVITY = 0.007;       
        const CAR_HEIGHT_OFFSET = 0.0; 

        // --- 6. MINIMAP LOOP ---
        const miniCanvas = document.getElementById('minimap_canvas');
        const miniCtx = miniCanvas.getContext('2d');

        function drawMinimap() {
            miniCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
            miniCtx.fillStyle = 'rgba(15, 70, 15, 0.6)';
            trees.forEach(tree => {
                miniCtx.beginPath();
                miniCtx.arc(tree.x * MAP_SCALE + MAP_CENTER, tree.z * MAP_SCALE + MAP_CENTER, 1.2, 0, Math.PI * 2);
                miniCtx.fill();
            });
            const carMapX = car.position.x * MAP_SCALE + MAP_CENTER;
            const carMapZ = car.position.z * MAP_SCALE + MAP_CENTER;
            miniCtx.save();
            miniCtx.translate(carMapX, carMapZ);
            miniCtx.rotate(-car.rotation.y + Math.PI); 
            miniCtx.fillStyle = '#FF0000';
            miniCtx.beginPath();
            miniCtx.moveTo(0, -7); miniCtx.lineTo(4, 4); miniCtx.lineTo(-4, 4);
            miniCtx.closePath(); miniCtx.fill();
            miniCtx.restore();
        }

        // --- 7. CONTROLS ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

        // --- 8. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (keys.w) speed = Math.min(speed + ACCELERATION, MAX_SPEED); 
            else if (keys.s) speed = Math.max(speed - 0.02, -0.4);
            else speed *= 0.985; 

            if (keys.a) rotation += 0.035 * (speed > 0 ? 1 : -0.5);
            if (keys.d) rotation -= 0.035 * (speed > 0 ? 1 : -0.5);

            car.rotation.y = rotation;
            car.translateZ(speed);

            // Animate wheel spinning based on forward speed
            const wheelSpinDelta = speed * 1.5;
            frontLeftWheel.rotation.x += wheelSpinDelta;
            frontRightWheel.rotation.x += wheelSpinDelta;
            rearLeftWheel.rotation.x += wheelSpinDelta;
            rearRightWheel.rotation.x += wheelSpinDelta;

            // --- REALTIME TREE COLLISION SYSTEM ---
            for (let i = 0; i < trees.length; i++) {
                const tree = trees[i];
                const dx = car.position.x - tree.x;
                const dz = car.position.z - tree.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                // If overlapping tree perimeter
                if (distance < tree.radius) {
                    // Stop car momentum completely
                    speed = -speed * 0.4; // Bounce back slightly
                    
                    // Push car cleanly out of collision zone so it doesn't get stuck permanently
                    const pushX = (dx / distance) * (tree.radius - distance + 0.1);
                    const pushZ = (dz / distance) * (tree.radius - distance + 0.1);
                    
                    car.position.x += pushX;
                    car.position.z += pushZ;
                }
            }

            // --- VERTICAL GRAVITY ENGINE ---
            const groundY = getHeight(car.position.x, car.position.z);
            const currentVehicleFloor = car.position.y - CAR_HEIGHT_OFFSET;

            let isAirborne = false;

            if (currentVehicleFloor > groundY + 0.1) {
                verticalVelocity -= GRAVITY;
                document.getElementById('airtime').style.display = 'inline';
                isAirborne = true;
            } else {
                document.getElementById('airtime').style.display = 'none';
                
                const nextGroundY = getHeight(
                    car.position.x + Math.sin(rotation) * speed, 
                    car.position.z + Math.cos(rotation) * speed
                );
                
                const slopeDelta = nextGroundY - groundY;

                if (slopeDelta < -1.2 && speed > 0.6) { 
                    verticalVelocity = speed * 0.12; 
                    isAirborne = true;
                } else {
                    verticalVelocity = 0;
                    car.position.y = groundY + CAR_HEIGHT_OFFSET;
                }
            }

            car.position.y += verticalVelocity;

            if (car.position.y < groundY + CAR_HEIGHT_OFFSET) {
                car.position.y = groundY + CAR_HEIGHT_OFFSET;
                verticalVelocity = 0;
                isAirborne = false;
            }

            // --- DYNAMIC SLOPED TILT ---
            if (!isAirborne) {
                const lookDist = 1.5;
                const dirX = Math.sin(rotation);
                const dirZ = Math.cos(rotation);

                const frontY = getHeight(car.position.x + dirX * lookDist, car.position.z + dirZ * lookDist);
                const backY = getHeight(car.position.x - dirX * lookDist, car.position.z - dirZ * lookDist);

                const pitchAngle = Math.atan2(backY - frontY, lookDist * 2);
                carChassisContainer.rotation.x = THREE.MathUtils.lerp(carChassisContainer.rotation.x, pitchAngle, 0.15);
            } else {
                carChassisContainer.rotation.x = THREE.MathUtils.lerp(carChassisContainer.rotation.x, 0, 0.02);
            }

            // Sandbox Boundaries Wrapping Loop
            if (car.position.x > WORLD_SIZE/2) car.position.x = -WORLD_SIZE/2;
            if (car.position.x < -WORLD_SIZE/2) car.position.x = WORLD_SIZE/2;
            if (car.position.z > WORLD_SIZE/2) car.position.z = -WORLD_SIZE/2;
            if (car.position.z < -WORLD_SIZE/2) car.position.z = WORLD_SIZE/2;

            // Camera Engine Tracker
            const relativeCameraOffset = new THREE.Vector3(0, 4.5, -11);
            const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
            camera.position.lerp(cameraOffset, 0.08); 
            camera.lookAt(new THREE.Vector3(car.position.x, car.position.y + 0.5, car.position.z));

            // UI Speedometer Rendering
            document.getElementById('speed').innerText = Math.round(speed * 100);
            drawMinimap();

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
