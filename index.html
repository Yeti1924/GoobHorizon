<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goob Horizon - Expanded Roads</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; }
        /* Existing CSS kept for styling parity... */
        #auth_overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #05050a; z-index: 9999; display: flex; justify-content: center; align-items: center; color: #fff; }
        #stats_hud { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.7); padding: 15px; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="auth_overlay"><button id="join_btn">START EXPANDED WORLD</button></div>
    <div id="stats_hud">Cash: $<span id="hud_cash">0</span></div>

    <script>
        // --- EXPANDED WORLD CONFIG ---
        const WORLD_SIZE = 4000; 
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 8000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ENHANCED TERRAIN & ROAD ---
        function getHeight(x, z) {
            // Main hills
            let h = Math.sin(x * 0.005) * Math.cos(z * 0.005) * 60;
            // Add a "flat" road strip along the Z axis
            if (Math.abs(x) < 30) return 0; 
            return h;
        }

        const groundGeom = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 200, 200);
        groundGeom.rotateX(-Math.PI/2);
        const pos = groundGeom.attributes.position.array;
        for(let i=0; i<pos.length; i+=3) {
            pos[i+1] = getHeight(pos[i], pos[i+2]);
        }
        const ground = new THREE.Mesh(groundGeom, new THREE.MeshStandardMaterial({color: 0x224422}));
        scene.add(ground);

        // Simple Road Visualizer
        const roadGeom = new THREE.PlaneGeometry(60, WORLD_SIZE);
        roadGeom.rotateX(-Math.PI/2);
        const road = new THREE.Mesh(roadGeom, new THREE.MeshBasicMaterial({color: 0x333333}));
        road.position.y = 0.5;
        scene.add(road);

        // Car setup
        const car = new THREE.Mesh(new THREE.BoxGeometry(2,1,4), new THREE.MeshNormalMaterial());
        scene.add(car);

        let speed = 0, rot = 0;
        const keys = {w:0, a:0, s:0, d:0};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = 1;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            // --- PHYSICS LOGIC ---
            // Calculate incline: Compare height at current pos vs front pos
            let frontX = car.position.x + Math.sin(rot) * 5;
            let frontZ = car.position.z + Math.cos(rot) * 5;
            let incline = getHeight(frontX, frontZ) - getHeight(car.position.x, car.position.z);

            // Acceleration & Gravity influence
            if(keys.w) speed += 0.05 - (incline * 0.02); // Slows on hill climb
            if(keys.s) speed -= 0.05;
            speed *= 0.98; // Friction

            // Turning with Speed Penalty
            if(keys.a) rot += 0.04 * (speed/2);
            if(keys.d) rot -= 0.04 * (speed/2);

            car.rotation.y = rot;
            car.position.x += Math.sin(rot) * speed;
            car.position.z += Math.cos(rot) * speed;
            car.position.y = getHeight(car.position.x, car.position.z) + 1;

            camera.position.set(car.position.x - Math.sin(rot)*20, car.position.y + 10, car.position.z - Math.cos(rot)*20);
            camera.lookAt(car.position);
            renderer.render(scene, camera);
        }

        document.getElementById('join_btn').onclick = () => {
            document.getElementById('auth_overlay').style.display = 'none';
            animate();
        };
    </script>
</body>
</html>
