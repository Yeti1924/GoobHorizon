<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goob Horizon - Ultimate Sandbox Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        
        /* --- SIGN IN SCREEN OVERLAY --- */
        #auth_overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0d0d1a 0%, #05050a 100%);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .auth-container {
            background: rgba(20, 20, 67, 0.9);
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #00bfff;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.3);
            text-align: center;
            width: 340px;
        }

        .auth-container h1 {
            font-size: 32px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff1133, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-container p { font-size: 14px; color: #8a8ab0; margin-bottom: 25px; }

        .auth-container input[type="text"] {
            width: 100%; padding: 12px 20px; margin-bottom: 20px; border-radius: 8px;
            border: 1px solid rgba(0, 191, 255, 0.4); background: rgba(10, 10, 20, 0.6);
            color: #fff; font-size: 16px; box-sizing: border-box; outline: none; text-align: center;
        }

        .color-picker-container {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            margin-bottom: 25px; background: rgba(10, 10, 20, 0.4); padding: 10px; border-radius: 8px;
        }

        .color-wheel { -webkit-appearance: none; appearance: none; width: 50px; height: 50px; background: none; border: none; cursor: pointer; }
        .color-wheel::-webkit-color-swatch { border-radius: 50%; border: 2px solid #fff; }

        .auth-container button {
            width: 100%; padding: 14px; background: linear-gradient(90deg, #00bfff, #ff00ff);
            border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 191, 255, 0.4);
        }

        /* --- DASHBOARD GAME UI --- */
        #dashboard {
            position: absolute; bottom: 25px; left: 30px; width: 180px; height: 180px; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(20,20,30,0.8) 0%, rgba(10,10,15,0.95) 80%);
            border: 2px solid rgba(0, 191, 255, 0.4); border-radius: 50%;
        }

        #gauge_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #speed_digital { z-index: 2; font-size: 44px; font-weight: 900; color: #fff; line-height: 40px; }
        #speed_unit { z-index: 2; font-size: 12px; font-weight: 700; color: #00bfff; letter-spacing: 1px; }

        #airtime {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            font-size: 24px; font-weight: 900; color: #ffcc00; text-shadow: 0 0 10px #ffcc00; display: none;
            text-align: center;
        }

        #minimap_canvas {
            position: absolute; top: 20px; right: 20px; width: 200px; height: 200px;
            border: 2px solid rgba(255, 255, 255, 0.4); background: rgba(10, 20, 15, 0.85); border-radius: 8px;
        }

        /* --- LIVE RACE CHAT OVERLAY --- */
        #chat_box {
            position: absolute; bottom: 25px; left: 230px; width: 320px; height: 180px;
            background: rgba(0, 100, 0, 0.6); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;
        }
        #chat_logs { flex: 1; overflow-y: auto; color: #ddd; font-size: 13px; margin-bottom: 5px; word-wrap: break-word; }
        #chat_input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #00bfff; border-radius: 4px;
            padding: 6px; color: #fff; font-size: 13px; box-sizing: border-box; outline: none;
        }

        /* --- STATS & SHOP PANEL --- */
        #stats_hud {
            position: absolute; top: 20px; left: 20px; color: #fff; font-size: 16px;
            font-weight: bold; background: rgba(15,15,30,0.7); padding: 15px; border-radius: 8px;
            border-left: 4px solid #ff00ff;
        }
        .hud-tip { font-size: 11px; color: #aaa; font-weight: normal; margin-top: 5px; }

        #upgrade_shop {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 15, 25, 0.95); border: 2px solid #ff00ff; border-radius: 12px;
            padding: 25px; width: 320px; color: #fff; display: none; z-index: 1000;
        }
        .shop-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .shop-btn {
            background: linear-gradient(90deg, #ff00ff, #7000ff); border: none; color: #fff;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;
        }
        .shop-btn:hover { filter: brightness(1.2); }
        .close-shop { width: 100%; padding: 8px; margin-top: 15px; background: #444; border: none; color: #fff; cursor: pointer; border-radius: 4px; }
    
@media (max-width:768px){
#dashboard{width:120px;height:120px;bottom:10px;left:10px}
#gauge_canvas{width:120px;height:120px}
#speed_digital{font-size:28px}
#speed_unit{font-size:10px}
#minimap_canvas{width:100px;height:100px;top:10px;right:10px}
#stats_hud{font-size:12px;padding:8px;top:10px;left:10px}
#chat_box{width:calc(100% - 20px);height:110px;left:10px;bottom:140px}
#upgrade_shop{width:90%;max-width:320px}
.auth-container{width:90%;padding:20px}
}
#mobileControls{display:none;position:fixed;bottom:20px;right:20px;z-index:999}
#mobileControls button{width:60px;height:60px;margin:4px;border:none;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;font-size:24px}
@media (max-width:768px){#mobileControls{display:block}}

    <script type="module">

<body>

        <div class="auth-container">

            <div class="color-picker-container">

<script>
        let gameActive = false;
        let playerDisplayName = "GuestNoNickName";
        let playerSelectedColor = "#00bfff";
        
        // Upgrade Stats System
        let playerCash = 50;
        let upgradeTiers = { speed: 1, grip: 1 };

        // Precise Air Tracking Engine Variables
        let isAirborne = false;
        let airTimeStart = 0;
        let lastMultiplierTick = 0;
        let activeMultiplier = 1;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x050510);
        document.body.appendChild(renderer.domElement);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(100, 200, 50);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x404050));

        // --- WORLD HEIGHT FIELD ---
        const WORLD_SIZE = 1600; 
        const MAP_SCALE = 200 / WORLD_SIZE; 
        const MAP_CENTER = 100;
        const BOUNDARY_LIMIT = (WORLD_SIZE / 2) - 10; // Invisible fallback check padding

        function getHeight(x, z) {
            const hill1 = Math.sin(x * 0.015) * Math.cos(z * 0.015) * 35; 
            const hill2 = Math.sin(x * 0.004) * Math.cos(z * 0.006) * 18;
            return hill1 + hill2;
        }

        const groundGeom = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 120, 120);
        groundGeom.rotateX(-Math.PI / 2);
        const vertices = groundGeom.attributes.position.array;
        for (let i = 0; i < vertices.length; i += 3) {
            vertices[i + 1] = getHeight(vertices[i], vertices[i + 2]);
        }
        groundGeom.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({ color: 0x223a22, wireframe: false, flatShading: true, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        scene.add(ground);

        // --- VISUAL BOUNDARY BARRIERS ---
        const barrierMat = new THREE.MeshBasicMaterial({ color: 0xff0055, side: THREE.DoubleSide, transparent: true, opacity: 0.4, wireframe: true });
        const halfSize = WORLD_SIZE / 2;

        // North Barrier
        const northWall = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, 80), barrierMat);
        northWall.position.set(0, 20, -halfSize);
        scene.add(northWall);

        // South Barrier
        const southWall = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, 80), barrierMat);
        southWall.position.set(0, 20, halfSize);
        southWall.rotation.y = Math.PI;
        scene.add(southWall);

        // East Barrier
        const eastWall = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, 80), barrierMat);
        eastWall.position.set(halfSize, 20, 0);
        eastWall.rotation.y = -Math.PI / 2;
        scene.add(eastWall);

        // West Barrier
        const westWall = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, 80), barrierMat);
        westWall.position.set(-halfSize, 20, 0);
        westWall.rotation.y = Math.PI / 2;
        scene.add(westWall);


        // --- TREES POPULATION ---
        const trees = [];
        const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x4a2e1b });
        const treeLeavesMat = new THREE.MeshStandardMaterial({ color: 0x143d14, flatShading: true });
        for (let i = 0; i < 250; i++) {
            const tx = Math.sin(i * 927) * WORLD_SIZE * 0.44;
            const tz = Math.cos(i * 341) * WORLD_SIZE * 0.44;
            const ty = getHeight(tx, tz);
            const group = new THREE.Group();
            const t = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.7, 5), treeTrunkMat); t.position.y = 2.5;
            const l = new THREE.Mesh(new THREE.ConeGeometry(3, 8, 4), treeLeavesMat); l.position.y = 6.5;
            group.add(t, l); group.position.set(tx, ty, tz); scene.add(group);
            trees.push({ x: tx, z: tz, radius: 4.0 });
        }

        // --- NAME / CHAT TEXTURE CREATOR ---
        function createDynamicTag(name, text = "") {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 80;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(10, 10, 20, 0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 3; ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'Bold 18px sans-serif'; ctx.fillStyle = '#00bfff'; ctx.textAlign = 'center';
            ctx.fillText(name, 128, 25);
            
            if(text) {
                ctx.font = '14px sans-serif'; ctx.fillStyle = '#ffffff';
                ctx.fillText(text.substring(0, 22), 128, 55);
            }
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
            sprite.scale.set(5.5, 1.7, 1); sprite.position.y = 3.6;
            return sprite;
        }

        // --- HYPERCAR ASSEMBLE ---
        function createCarModel(colorHexStr, tagLabel = "") {
            const group = new THREE.Group();
            const chassisContainer = new THREE.Group();
            const cleanColor = parseInt((colorHexStr || "#00bfff").replace("#", "0x"), 16);
            
            const bMat = new THREE.MeshStandardMaterial({ color: cleanColor, metalness: 0.7, roughness: 0.2 });
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8 });
            
            const base = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.5, 6), bMat); base.position.y = 0.4;
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.7, 2.4), new THREE.MeshStandardMaterial({color:0x0a0a15})); cabin.position.set(0, 0.9, -0.2);
            const spoiler = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.1, 0.8), bMat); spoiler.position.set(0, 1.2, -2.8);
            chassisContainer.add(base, cabin, spoiler);

            const wGeom = new THREE.CylinderGeometry(0.65, 0.65, 0.5, 12); wGeom.rotateZ(Math.PI / 2);
            const wheels = [
                {x: 1.7, z: 1.8}, {x: -1.7, z: 1.8}, {x: 1.7, z: -1.8}, {x: -1.7, z: -1.8}
            ].map(pos => {
                const wMesh = new THREE.Mesh(wGeom, wheelMat); wMesh.position.set(pos.x, 0.5, pos.z);
                chassisContainer.add(wMesh); return wMesh;
            });

            group.add(chassisContainer);
            const tag = createDynamicTag(tagLabel); group.add(tag);
            return { mesh: group, container: chassisContainer, wheels, tag };
        }

        let localCar = createCarModel("#00bfff", "Driver");
        let car = localCar.mesh; scene.add(car);
        car.position.set(0, 10, 0);

        // --- AI CAR AGENTS ---
        const aiDrivers = [];
        const aiColors = ["#ff5500", "#ffcc00", "#ff0055", "#00ff66", "#9900ff"];
        for(let i=0; i<5; i++) {
            let aiObj = createCarModel(aiColors[i], "Clanker_" + (i+1));
            aiObj.mesh.position.set((Math.random()-0.5)*300, 10, (Math.random()-0.5)*300);
            scene.add(aiObj.mesh);
            aiDrivers.push({
                ...aiObj, speed: 0.4 + Math.random()*0.3, rotY: Math.random()*Math.PI*2,
                targetX: (Math.random()-0.5)*600, targetZ: (Math.random()-0.5)*600
            });
        }

        const remotePlayers = {};

        // --- PHYSICS CONFIG ---
        let speed = 0, rotation = 0;
        let verticalVelocity = 0;
        const keys = { w: false, a: false, s: false, d: false };

        // --- INTERACTIVE UI TRIGGERS ---
        window.toggleShop = function() {
            const shop = document.getElementById('upgrade_shop');
            shop.style.display = shop.style.display === 'block' ? 'none' : 'block';
            document.getElementById('shop_cash').innerText = playerCash;
        };

        window.buyUpgrade = function(type) {
            let cost = type === 'speed' ? upgradeTiers.speed * 150 : upgradeTiers.grip * 200;
            if(playerCash >= cost) {
                playerCash -= cost;
                upgradeTiers[type]++;
                document.getElementById('hud_cash').innerText = playerCash;
                document.getElementById('shop_cash').innerText = playerCash;
                document.getElementById('tier_speed').innerText = upgradeTiers.speed;
                document.getElementById('tier_grip').innerText = upgradeTiers.grip;
                document.getElementById(`lbl_${type}`).innerText = "Tier " + upgradeTiers[type];
            }
        };

        // UI Key Handling
        window.addEventListener('keydown', (e) => {
            if(document.activeElement === document.getElementById('chat_input')) {
                if(e.key === 'Enter') sendChatMessage();
                return;
            }
            if(e.key.toLowerCase() === 'p') toggleShop();
            if(e.key === 'Enter') document.getElementById('chat_input').focus();
            if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
        });

        function sendChatMessage() {
            const inp = document.getElementById('chat_input');
            const msg = inp.value.trim();
            inp.value = ""; inp.blur();
            if(!msg) return;
            
            if(window.network) {
                window.network.push(window.network.chatRef, { name: playerDisplayName, msg: msg, time: Date.now() });
            } else {
                showLocalBubble(playerDisplayName, msg);
            }
        }

        function showLocalBubble(sender, text) {
            if(sender === playerDisplayName) {
                scene.remove(localCar.tag);
                localCar.tag = createDynamicTag(playerDisplayName, text);
                localCar.mesh.add(localCar.tag);
                setTimeout(() => {
                    scene.remove(localCar.tag);
                    localCar.tag = createDynamicTag(playerDisplayName);
                    localCar.mesh.add(localCar.tag);
                }, 4000);
            }
            const log = document.getElementById('chat_logs');
            log.innerHTML += `<div><b>${sender}:</b> ${text}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        
function bindTouch(id,key){
 const b=document.getElementById(id);
 if(!b)return;
 ['touchstart'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys[key]=true;}));
 ['touchend','touchcancel'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys[key]=false;}));
}
window.addEventListener('load',()=>{
['up:w','down:s','left:a','right:d'].forEach(p=>{let[a,k]=p.split(':');bindTouch(a,k);});
});
window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

// --- ENGINE TICK ANIMATION LOOP ---
        let lastNetTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);

            if (gameActive) {
                // Adjust performance parameters based on active upgrades
                const maxSpeed = 1.3 + (upgradeTiers.speed * 0.15);
                const turnSpeed = 0.032 + (upgradeTiers.grip * 0.005);

                const groundY = getHeight(car.position.x, car.position.z);
                
                if (keys.w) speed = Math.min(speed + 0.005, maxSpeed);
                else if (keys.s) speed = Math.max(speed - 0.02, -0.5);
                else speed *= 0.98;

                if (keys.a) rotation += turnSpeed * (speed >= 0 ? 1 : -0.6);
                if (keys.d) rotation -= turnSpeed * (speed >= 0 ? 1 : -0.6);

                car.rotation.y = rotation;
                car.translateZ(speed);

                // --- MAP EDGE BARRIER PHYSICS COLLISION DETECTION ---
                if (Math.abs(car.position.x) >= BOUNDARY_LIMIT) {
                    speed = -speed * 0.6; // Reflect kinetic speed vector
                    car.position.x = Math.sign(car.position.x) * (BOUNDARY_LIMIT - 2);
                }
                if (Math.abs(car.position.z) >= BOUNDARY_LIMIT) {
                    speed = -speed * 0.6;
                    car.position.z = Math.sign(car.position.z) * (BOUNDARY_LIMIT - 2);
                }

                // --- 3D SURFACE HILL ROTATION ALIGNMENT ---
                const offsetRadius = 1.5;
                const frontY = getHeight(car.position.x + Math.sin(rotation)*offsetRadius, car.position.z + Math.cos(rotation)*offsetRadius);
                const backY = getHeight(car.position.x - Math.sin(rotation)*offsetRadius, car.position.z - Math.cos(rotation)*offsetRadius);
                const leftY = getHeight(car.position.x + Math.sin(rotation + Math.PI/2)*offsetRadius, car.position.z + Math.cos(rotation + Math.PI/2)*offsetRadius);
                const rightY = getHeight(car.position.x + Math.sin(rotation - Math.PI/2)*offsetRadius, car.position.z + Math.cos(rotation - Math.PI/2)*offsetRadius);

                // Map pitch and roll terrain slopes
                const pitchAngle = Math.atan2(backY - frontY, offsetRadius * 2);
                const rollAngle = Math.atan2(leftY - rightY, offsetRadius * 2);

                // Handle gravity & airborne mechanics
                if (car.position.y > groundY + 0.2) {
                    verticalVelocity -= 0.008;
                    
                    if (!isAirborne) {
                        isAirborne = true;
                        airTimeStart = Date.now();
                        lastMultiplierTick = airTimeStart;
                        activeMultiplier = 1;
                        playerCash += 20; 
                    }

                    const totalAirTimeSeconds = (Date.now() - airTimeStart) / 1000;
                    
                    // MODIFIED: Checked every 1000ms (1 second) instead of 5000ms, and explicitly awards +$20 cash
                    if (Date.now() - lastMultiplierTick >= 1000) {
                        activeMultiplier += 1;
                        playerCash += 20; 
                        lastMultiplierTick = Date.now();
                    }

                    document.getElementById('airtime').style.display = 'block';
                    document.getElementById('air_timer').innerText = `${totalAirTimeSeconds.toFixed(1)}s (x${activeMultiplier})`;

                } else {
                    isAirborne = false;
                    document.getElementById('airtime').style.display = 'none';
                    
                    if (frontY - groundY < -1.5 && speed > 0.9) {
                        verticalVelocity = speed * 0.15;
                    } else {
                        verticalVelocity = 0;
                        car.position.y = groundY;
                    }
                }
                car.position.y += verticalVelocity;

                // Smoothly update terrain tracking containers
                localCar.container.rotation.x = THREE.MathUtils.lerp(localCar.container.rotation.x, pitchAngle, 0.2);
                localCar.container.rotation.z = THREE.MathUtils.lerp(localCar.container.rotation.z, rollAngle, 0.2);

                localCar.wheels.forEach(w => w.rotation.x += speed * 1.2);
                document.getElementById('hud_cash').innerText = playerCash;

                // Tree Boundaries
                trees.forEach(t => {
                    let d = Math.hypot(car.position.x - t.x, car.position.z - t.z);
                    if(d < t.radius) {
                        speed = -speed * 0.5;
                        car.position.x += ((car.position.x - t.x)/d) * 0.5;
                    }
                });

                // --- AI AGENT INTELLIGENT SIMULATION ---
                aiDrivers.forEach(ai => {
                    let aiGroundY = getHeight(ai.mesh.position.x, ai.mesh.position.z);
                    let dx = ai.targetX - ai.mesh.position.x;
                    let dz = ai.targetZ - ai.mesh.position.z;
                    let dist = Math.hypot(dx, dz);

                    if(dist < 20 || Math.abs(ai.mesh.position.x) >= BOUNDARY_LIMIT || Math.abs(ai.mesh.position.z) >= BOUNDARY_LIMIT) {
                        ai.targetX = (Math.random()-0.5)*(WORLD_SIZE - 60);
                        ai.targetZ = (Math.random()-0.5)*(WORLD_SIZE - 60);
                    }

                    let targetRot = Math.atan2(dx, dz);
                    let diff = targetRot - ai.rotY;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    ai.rotY += Math.sign(diff) * 0.02;

                    ai.mesh.rotation.y = ai.rotY;
                    ai.mesh.translateZ(ai.speed);
                    ai.mesh.position.y = aiGroundY;

                    // AI Terrain Alignment
                    let aiF = getHeight(ai.mesh.position.x + Math.sin(ai.rotY)*1.5, ai.mesh.position.z + Math.cos(ai.rotY)*1.5);
                    let aiB = getHeight(ai.mesh.position.x - Math.sin(ai.rotY)*1.5, ai.mesh.position.z - Math.cos(ai.rotY)*1.5);
                    ai.container.rotation.x = Math.atan2(aiB - aiF, 3.0);

                    ai.wheels.forEach(w => w.rotation.x += ai.speed);
                });

                // Network snapshot sync stream
                if (window.network && time - lastNetTime > 40) {
                    lastNetTime = time;
                    window.network.set(window.network.playerRef, {
                        x: car.position.x, y: car.position.y, z: car.position.z,
                        rotY: rotation, rotX: localCar.container.rotation.x, rotZ: localCar.container.rotation.z,
                        speed: speed, name: playerDisplayName, color: playerSelectedColor
                    });
                }
            }

            // Camera Tracking
            let camOffset = new THREE.Vector3(0, 5.5, -13).applyMatrix4(car.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(new THREE.Vector3(car.position.x, car.position.y + 0.5, car.position.z));

            // Interpolate remote player updates
            for (let id in remotePlayers) {
                let r = remotePlayers[id];
                r.mesh.position.lerp(r.tPos, 0.2);
                r.mesh.rotation.y = THREE.MathUtils.lerp(r.mesh.rotation.y, r.tRotY, 0.2);
                r.container.rotation.x = THREE.MathUtils.lerp(r.container.rotation.x, r.tRotX, 0.2);
                r.container.rotation.z = THREE.MathUtils.lerp(r.container.rotation.z, r.tRotZ, 0.2);
            }

            // HUD Gauges Renderer Engine
            document.getElementById('speed_digital').innerText = Math.round(Math.abs(speed) * 95);
            const gCtx = document.getElementById('gauge_canvas').getContext('2d');
            gCtx.clearRect(0,0,180,180);
            gCtx.beginPath(); gCtx.arc(90, 90, 75, 0.75*Math.PI, 2.25*Math.PI);
            gCtx.strokeStyle = 'rgba(255,255,255,0.1)'; gCtx.lineWidth = 6; gCtx.stroke();
            
            gCtx.beginPath();
            let pEnd = 0.75*Math.PI + (1.5*Math.PI)*Math.min(Math.abs(speed)/2, 1.0);
            gCtx.arc(90, 90, 75, 0.75*Math.PI, pEnd);
            gCtx.strokeStyle = '#00bfff'; gCtx.lineWidth = 8; gCtx.stroke();

            // Minimap Draw Engine
            const mCtx = document.getElementById('minimap_canvas').getContext('2d');
            mCtx.clearRect(0,0,200,200);
            mCtx.fillStyle = 'rgba(255,255,255,0.2)';
            aiDrivers.forEach(ai => mCtx.fillRect(ai.mesh.position.x*MAP_SCALE+MAP_CENTER, ai.mesh.position.z*MAP_SCALE+MAP_CENTER, 3, 3));
            mCtx.fillStyle = '#ff00ff';
            mCtx.fillRect(car.position.x*MAP_SCALE+MAP_CENTER, car.position.z*MAP_SCALE+MAP_CENTER, 5, 5);

            renderer.render(scene, camera);
        }

        // --- MULTIPLAYER AND CHAT SYNC SYSTEM ---
        const initNetwork = setInterval(() => {
            if(window.network) {
                clearInterval(initNetwork);
                const { ref, db, onValue, chatRef } = window.network;

                // Watch multiplayer players array
                onValue(ref(db, 'players'), (snap) => {
                    const data = snap.val(); if(!data) return;
                    for(let id in data) {
                        if(id === window.network.playerId) continue;
                        let p = data[id];
                        if(!remotePlayers[id]) {
                            let rModel = createCarModel(p.color, p.name);
                            scene.add(rModel.mesh);
                            remotePlayers[id] = { ...rModel, tPos: new THREE.Vector3(p.x, p.y, p.z), tRotY: p.rotY, tRotX: p.rotX, tRotZ: p.rotZ };
                        } else {
                            remotePlayers[id].tPos.set(p.x, p.y, p.z);
                            remotePlayers[id].tRotY = p.rotY; remotePlayers[id].tRotX = p.rotX; remotePlayers[id].tRotZ = p.rotZ;
                        }
                    }
                });

                // Global Chat synchronization stream listener loop
                onValue(chatRef, (snap) => {
                    const data = snap.val(); if(!data) return;
                    const keys = Object.keys(data);
                    const latest = data[keys[keys.length - 1]];
                    if(latest && latest.time > Date.now() - 2000) {
                        showLocalBubble(latest.name, latest.msg);
                    }
                });

                animate(0);
            }
        }, 100);

        document.getElementById('join_btn').addEventListener('click', () => {
            let nick = document.getElementById('username_input').value.trim();
            if(nick) playerDisplayName = nick;
            playerSelectedColor = document.getElementById('color_wheel').value;

            scene.remove(car);
            localCar = createCarModel(playerSelectedColor, playerDisplayName);
            car = localCar.mesh; scene.add(car); car.position.set(0, 10, 0);

            document.getElementById('auth_overlay').style.display = 'none';
            gameActive = true;
        });
    </script>
</body>
</html>
