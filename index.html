<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goob Horizon - Extended Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #auth_overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #0d0d1a 0%, #05050a 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; color: #fff; }
        .auth-container { background: rgba(20, 20, 35, 0.9); padding: 40px; border-radius: 16px; border: 2px solid #00bfff; box-shadow: 0 0 30px rgba(0, 191, 255, 0.3); text-align: center; width: 340px; }
        .auth-container h1 { font-size: 32px; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(90deg, #ff1133, #00bfff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-container p { font-size: 14px; color: #8a8ab0; margin-bottom: 25px; }
        .auth-container input[type="text"] { width: 100%; padding: 12px 20px; margin-bottom: 20px; border-radius: 8px; border: 1px solid rgba(0, 191, 255, 0.4); background: rgba(10, 10, 20, 0.6); color: #fff; font-size: 16px; box-sizing: border-box; outline: none; text-align: center; }
        .color-picker-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; background: rgba(10, 10, 20, 0.4); padding: 10px; border-radius: 8px; }
        .color-wheel { -webkit-appearance: none; appearance: none; width: 50px; height: 50px; background: none; border: none; cursor: pointer; }
        .color-wheel::-webkit-color-swatch { border-radius: 50%; border: 2px solid #fff; }
        .auth-container button { width: 100%; padding: 14px; background: linear-gradient(90deg, #00bfff, #ff00ff); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #dashboard { position: absolute; bottom: 25px; left: 30px; width: 180px; height: 180px; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(20,20,30,0.8) 0%, rgba(10,10,15,0.95) 80%); border: 2px solid rgba(0, 191, 255, 0.4); border-radius: 50%; }
        #gauge_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #speed_digital { z-index: 2; font-size: 44px; font-weight: 900; color: #fff; line-height: 40px; }
        #speed_unit { z-index: 2; font-size: 12px; font-weight: 700; color: #00bfff; letter-spacing: 1px; }
        #minimap_canvas { position: absolute; top: 20px; right: 20px; width: 200px; height: 200px; border: 2px solid rgba(255, 255, 255, 0.4); background: rgba(10, 20, 15, 0.85); border-radius: 8px; }
        #stats_hud { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 16px; font-weight: bold; background: rgba(15,15,30,0.7); padding: 15px; border-radius: 8px; border-left: 4px solid #ff00ff; }
        #chat_box { position: absolute; bottom: 25px; left: 230px; width: 320px; height: 180px; background: rgba(10, 10, 20, 0.6); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; display: flex; flex-direction: column; padding: 10px; }
        #chat_logs { flex: 1; overflow-y: auto; color: #ddd; font-size: 13px; margin-bottom: 5px; }
        #chat_input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #00bfff; border-radius: 4px; padding: 6px; color: #fff; font-size: 13px; box-sizing: border-box; }
        #upgrade_shop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 15, 25, 0.95); border: 2px solid #ff00ff; border-radius: 12px; padding: 25px; width: 320px; color: #fff; display: none; z-index: 1000; }
        .shop-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .shop-btn { background: linear-gradient(90deg, #ff00ff, #7000ff); border: none; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .close-shop { width: 100%; padding: 8px; margin-top: 15px; background: #444; border: none; color: #fff; cursor: pointer; border-radius: 4px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="auth_overlay">
        <div class="auth-container">
            <h1>Goob Horizon</h1>
            <p>Extended World Sandbox</p>
            <input type="text" id="username_input" placeholder="Driver Nickname..." maxlength="12" value="Driver">
            <div class="color-picker-container">
                <input type="color" id="color_wheel" class="color-wheel" value="#00bfff">
                <span style="font-size: 13px; color: #aaa;">Select Body Finish</span>
            </div>
            <button id="join_btn">Start Sandbox</button>
        </div>
    </div>

    <div id="stats_hud">Cash: $<span id="hud_cash">0</span><br>Speed Tier: <span id="tier_speed">1</span> | Grip Tier: <span id="tier_grip">1</span></div>
    <div id="upgrade_shop">
        <h3 style="margin-top:0;">🔧 Performance Tuning</h3>
        <div class="shop-row"><div>🚀 Engine Power</div><button class="shop-btn" onclick="buyUpgrade('speed')">$150</button></div>
        <div class="shop-row"><div>🏎️ Sticky Tires</div><button class="shop-btn" onclick="buyUpgrade('grip')">$200</button></div>
        <button class="close-shop" onclick="toggleShop()">Resume Race</button>
    </div>

    <div id="dashboard">
        <canvas id="gauge_canvas" width="180" height="180"></canvas>
        <div id="speed_digital">0</div>
        <div id="speed_unit">MPH</div>
    </div>

    <div id="chat_box">
        <div id="chat_logs"></div>
        <input type="text" id="chat_input" placeholder="Press Enter to Chat...">
    </div>

    <canvas id="minimap_canvas" width="200" height="200"></canvas>
    
    <script>
        let gameActive = false, playerCash = 50, upgradeTiers = { speed: 1, grip: 1 }, speed = 0, rotation = 0, keys = { w: false, a: false, s: false, d: false };
        
        // --- EXPANDED WORLD ---
        const WORLD_SIZE = 4000; 
        const MAP_SCALE = 200 / WORLD_SIZE;
        const BOUNDARY_LIMIT = (WORLD_SIZE / 2) - 50;

        function getHeight(x, z) {
            // Road logic: Flat surfaces on the Cross (X=0 or Z=0)
            if (Math.abs(x) < 25 || Math.abs(z) < 25) return 0;
            const hill1 = Math.sin(x * 0.005) * Math.cos(z * 0.005) * 35;
            const hill2 = Math.sin(x * 0.002) * Math.cos(z * 0.003) * 18;
            return hill1 + hill2;
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404050));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(500, 500, 500);
        scene.add(sun);

        // Ground with higher density
        const groundGeom = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 300, 300);
        groundGeom.rotateX(-Math.PI / 2);
        const v = groundGeom.attributes.position.array;
        for (let i = 0; i < v.length; i += 3) v[i + 1] = getHeight(v[i], v[i + 2]);
        const ground = new THREE.Mesh(groundGeom, new THREE.MeshStandardMaterial({ color: 0x224422, flatShading: true }));
        scene.add(ground);

        // Simple car proxy
        const car = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({ color: 0x00bfff }));
        scene.add(car);

        window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });
        window.toggleShop = () => document.getElementById('upgrade_shop').style.display = document.getElementById('upgrade_shop').style.display === 'block' ? 'none' : 'block';

        function animate() {
            requestAnimationFrame(animate);
            if(gameActive) {
                if(keys.w) speed = Math.min(speed + 0.005, 2.0);
                else speed *= 0.98;
                if(keys.a) rotation += 0.03;
                if(keys.d) rotation -= 0.03;
                
                car.rotation.y = rotation;
                car.translateZ(speed);
                car.position.y = getHeight(car.position.x, car.position.z) + 1;

                // Camera
                camera.position.set(car.position.x - Math.sin(rotation)*15, car.position.y + 8, car.position.z - Math.cos(rotation)*15);
                camera.lookAt(car.position);
            }
            renderer.render(scene, camera);
        }

        document.getElementById('join_btn').addEventListener('click', () => {
            document.getElementById('auth_overlay').style.display = 'none';
            gameActive = true;
            animate();
        });
    </script>
</body>
</html>
