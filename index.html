<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goob Horizon Standalone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; }
    </style>
    <!-- Include Three.js for 3D Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">SPEED: <span id="speed">0</span> MPH</div>
    <script>
        // 1. Setup Scene, Camera, Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add lighting (Sun and Sky ambiance)
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 15);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 3. Create a Basic Car Mesh (Chassis + 4 Wheels)
        const car = new THREE.Group();
        const bodyGeom = new THREE.BoxGeometry(2, 0.6, 4);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0055, roughness: 0.2 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        car.add(body);
        scene.add(car);

        // Position Camera behind the vehicle
        camera.position.set(0, 3, -7);

        // 4. Basic Animation & Keyboard Input Loop
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if(e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

        let speed = 0;
        let rotation = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Simple physics math
            if (keys.w) speed = Math.min(speed + 0.01, 0.5);
            else if (keys.s) speed = Math.max(speed - 0.01, -0.2);
            else speed *= 0.95; // Friction friction

            if (keys.a) rotation += 0.03 * (speed / 0.5);
            if (keys.d) rotation -= 0.03 * (speed / 0.5);

            car.rotation.y = rotation;
            car.translateZ(speed);

            // Camera follow math
            const relativeCameraOffset = new THREE.Vector3(0, 3, -8);
            const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, cameraOffset.x, 0.1);
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, cameraOffset.y, 0.1);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, cameraOffset.z, 0.1);
            camera.lookAt(car.position);

            document.getElementById('speed').innerText = Math.round(speed * 300);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
