<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goob Horizon - Hypercar Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* --- SIGN IN SCREEN OVERLAY --- */
        #auth_overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0d0d1a 0%, #05050a 100%);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .auth-container {
            background: rgba(20, 20, 35, 0.85);
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #ff1133;
            box-shadow: 0 0 30px rgba(255, 17, 51, 0.3), inset 0 0 20px rgba(0, 191, 255, 0.1);
            text-align: center;
            width: 340px;
        }

        .auth-container h1 {
            font-size: 32px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff1133, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-container p {
            font-size: 14px;
            color: #8a8ab0;
            margin-bottom: 25px;
        }

        .auth-container input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 191, 255, 0.4);
            background: rgba(10, 10, 20, 0.6);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        .auth-container input[type="text"]:focus {
            border-color: #00bfff;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
        }

        /* --- DYNAMIC COLOR WHEEL SELECTION --- */
        .color-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a8ab0;
            margin-bottom: 8px;
            text-align: left;
            display: block;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(10, 10, 20, 0.4);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .color-wheel {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 55px;
            height: 55px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .color-wheel::-webkit-color-swatch {
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .color-wheel::-moz-color-swatch {
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .auth-container button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #ff1133, #ff00ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 17, 51, 0.4);
            transition: all 0.2s;
        }

        .auth-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 17, 51, 0.6);
        }

        /* --- DASHBOARD GAME UI --- */
        #dashboard {
            position: absolute;
            bottom: 25px;
            left: 30px;
            width: 220px;
            height: 220px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(20,20,30,0.7) 0%, rgba(10,10,15,0.9) 80%);
            border: 2px solid rgba(255, 20, 147, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.15), inset 0 0 15px rgba(0, 191, 255, 0.1);
        }

        #gauge_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #speed_digital {
            z-index: 2;
            font-size: 52px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            line-height: 45px;
        }

        #speed_unit {
            z-index: 2;
            font-size: 14px;
            font-weight: 700;
            color: #00bfff;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 191, 255, 0.5);
        }

        #airtime {
            position: absolute;
            top: -45px;
            font-size: 20px;
            font-weight: 800;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 12px #ffcc00;
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        #minimap_canvas {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 220px;
            height: 220px;
            border: 3px solid rgba(255, 255, 255, 0.6);
            background-color: rgba(10, 25, 10, 0.85);
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Firebase App and Database SDK Modules v9 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0_yk-kpB8Si-JGzI8k-qK9eWkGl5eRJ4",
            authDomain: "goob-horizon.firebaseapp.com",
            databaseURL: "https://goob-horizon-default-rtdb.firebaseio.com",
            projectId: "goob-horizon",
            storageBucket: "goob-horizon.firebasestorage.app",
            messagingSenderId: "527981366865",
            appId: "1:527981366865:web:d621647c471850d1aa7270",
            measurementId: "G-D10NCG1DK4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const playerId = "player_" + Math.floor(Math.random() * 100000);
        const playerRef = ref(db, `players/${playerId}`);

        onDisconnect(playerRef).remove();

        window.network = { playerId, playerRef, db, ref, onValue, set, remove };
    </script>
</head>
<body>

    <!-- SIGN IN GATE OVERLAY -->
    <div id="auth_overlay">
        <div class="auth-container">
            <h1>Goob Horizon</h1>
            <p>Hypercar Multiplayer Edition</p>
            <input type="text" id="username_input" placeholder="Enter Driver Name..." maxlength="14" value="Driver">
            
            <span class="color-label">Customize Paint Color:</span>
            <div class="color-picker-container">
                <input type="color" id="color_wheel" class="color-wheel" value="#ff1133">
                <span style="font-size: 14px; font-weight: bold; color: #aaa;">Click wheel to style</span>
            </div>

            <button id="join_btn">Join Race</button>
        </div>
    </div>

    <div id="dashboard">
        <span id="airtime" style="display: none;">Big Air Time!</span>
        <canvas id="gauge_canvas" width="220" height="220"></canvas>
        <div id="speed_digital">0</div>
        <div id="speed_unit">MPH</div>
    </div>

    <canvas id="minimap_canvas" width="220" height="220"></canvas>
    
    <script>
        // --- 1. SETUP ENGINE ---
        let gameActive = false;
        let playerDisplayName = "Driver";
        let playerSelectedColor = "#ff1133"; // Hex String tracked format

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x66CCFF);
        document.body.appendChild(renderer.domElement);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
        sunLight.position.set(50, 150, 50);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x606060));

        // --- 2. MAP & HILL GENERATION FUNCTION ---
        const WORLD_SIZE = 2000; 
        const MAP_SCALE = 220 / WORLD_SIZE; 
        const MAP_CENTER = 110;

        function getHeight(x, z) {
            const hill1 = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 25; 
            const hill2 = Math.sin(x * 0.005 + z * 0.01) * 12;
            return hill1 + hill2;
        }

        const groundGeom = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 150, 150);
        groundGeom.rotateX(-Math.PI / 2);

        const vertices = groundGeom.attributes.position.array;
        for (let i = 0; i < vertices.length; i += 3) {
            vertices[i + 1] = getHeight(vertices[i], vertices[i + 2]);
        }
        groundGeom.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, flatShading: true, roughness: 0.85 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        scene.add(ground);

        // --- 3. POPULATE COLLIDABLE TREES ---
        const trees = [];
        const TREE_COUNT = 450;
        const COLLISION_RADIUS = 3.5;
        
        const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3d28, roughness: 0.9 });
        const treeLeavesMat = new THREE.MeshStandardMaterial({ color: 0x1e5c1e, flatShading: true, roughness: 0.7 });

        for (let i = 0; i < TREE_COUNT; i++) {
            const pseudoX = Math.sin(i * 4325.2) * WORLD_SIZE * 0.45;
            const pseudoZ = Math.cos(i * 7215.7) * WORLD_SIZE * 0.45;
            const y = getHeight(pseudoX, pseudoZ);
            
            const treeGroup = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.9, 6, 5), treeTrunkMat);
            trunk.position.y = 3;
            treeGroup.add(trunk);
            
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(3.5, 10, 5), treeLeavesMat);
            leaves.position.y = 9;
            treeGroup.add(leaves);
            
            treeGroup.position.set(pseudoX, y, pseudoZ);
            scene.add(treeGroup);
            
            trees.push({ x: pseudoX, z: pseudoZ, radius: COLLISION_RADIUS });
        }

        // --- NAME TAG CANVAS FACTORY ---
        function createNameTag(nameString) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(10, 10, 20, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#00bfff';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'Bold 24px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(nameString, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(6, 1.5, 1);
            sprite.position.y = 3.2; 
            return sprite;
        }

        // --- 4. ADVANCED HYPERCAR MODEL DESIGN FACTORY ---
        function createCarModel(colorHexStr, accentHex = 0x00bfff, driverName = "") {
            const group = new THREE.Group();
            const chassisContainer = new THREE.Group();
            
            // Clean dynamic hex parse safety block
            let cleanColor = 0xff1133;
            if (colorHexStr) {
                cleanColor = parseInt(colorHexStr.replace("#", "0x"), 16);
            }
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: cleanColor, metalness: 0.8, roughness: 0.15 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x111122, metalness: 0.9, roughness: 0.05, transparent: true, opacity: 0.85 });
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.7 });
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 });
            const neonMat = new THREE.MeshBasicMaterial({ color: accentHex });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

            // 1. Lower Main Chassis Base
            const bodyBase = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.6, 6.5), bodyMat);
            bodyBase.position.y = 0.5;
            chassisContainer.add(bodyBase);

            // 2. Tapered Nose / Front Hood Cover
            const hood = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.4, 2.5), bodyMat);
            hood.position.set(0, 0.7, 2.0);
            chassisContainer.add(hood);

            // 3. Aerodynamic Curved Cabin Roof & Glass Line
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.8, 2.8), glassMat);
            cabin.position.set(0, 1.2, -0.4);
            chassisContainer.add(cabin);

            const roofOverlay = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.15, 2.0), bodyMat);
            roofOverlay.position.set(0, 1.6, -0.5);
            chassisContainer.add(roofOverlay);

            // 4. Rear Spoiler Wing System
            const wingStrutLeft = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.3), darkMat);
            wingStrutLeft.position.set(1.3, 1.0, -3.0);
            const wingStrutRight = wingStrutLeft.clone();
            wingStrutRight.position.x = -1.3;
            
            const mainWing = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.1, 0.9), bodyMat);
            mainWing.position.set(0, 1.4, -3.1);
            chassisContainer.add(wingStrutLeft, wingStrutRight, mainWing);

            // 5. Side Mirrors
            const mirrorL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.2), bodyMat);
            mirrorL.position.set(1.9, 1.0, 0.8);
            const mirrorR = mirrorL.clone();
            mirrorR.position.x = -1.9;
            chassisContainer.add(mirrorL, mirrorR);

            // 6. Laser Headlights
            const lightL = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.1), neonMat);
            lightL.position.set(1.2, 0.7, 3.26);
            const lightR = lightL.clone();
            lightR.position.x = -1.2;
            chassisContainer.add(lightL, lightR);

            // 7. Wheels Subassembly
            const wheelGeom = new THREE.CylinderGeometry(0.7, 0.7, 0.6, 16);
            wheelGeom.rotateZ(Math.PI / 2); 

            const rimGeom = new THREE.CylinderGeometry(0.45, 0.45, 0.65, 12);
            rimGeom.rotateZ(Math.PI / 2);

            function assembleWheel(x, y, z) {
                const wGroup = new THREE.Group();
                const tireMesh = new THREE.Mesh(wheelGeom, wheelMat);
                const rimMesh = new THREE.Mesh(rimGeom, rimMat);
                
                const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.7, 8), neonMat);
                cap.rotateZ(Math.PI / 2);
                
                wGroup.add(tireMesh, rimMesh, cap);
                wGroup.position.set(x, y, z);
                return wGroup;
            }
            
            const fl = assembleWheel(1.85, 0.5, 2.0);
            const fr = assembleWheel(-1.85, 0.5, 2.0);
            const rl = assembleWheel(1.85, 0.5, -2.0);
            const rr = assembleWheel(-1.85, 0.5, -2.0);

            chassisContainer.add(fl, fr, rl, rr);
            group.add(chassisContainer);

            if (driverName) {
                const tag = createNameTag(driverName);
                group.add(tag);
            }
            
            return { mesh: group, container: chassisContainer, wheels: [fl, fr, rl, rr] };
        }

        let localCarData = createCarModel("#ff1133", 0xffcc00);
        let car = localCarData.mesh;
        let carChassisContainer = localCarData.container;
        scene.add(car);
        
        car.position.set((Math.random() - 0.5) * 60, 20, (Math.random() - 0.5) * 60);
        camera.position.set(0, 6.5, -16);

        const remotePlayers = {};

        // --- 5. CONFIG TUNING PHYSICS ---
        let speed = 0, rotation = 0;
        let verticalVelocity = 0; 
        
        const BASE_MAX_SPEED = 1.4;    
        const ACCELERATION = 0.0035; 
        const GRAVITY = 0.007;       
        const CAR_HEIGHT_OFFSET = 0.0; 

        // --- 6. MINIMAP DRAW ENGINE ---
        const miniCanvas = document.getElementById('minimap_canvas');
        const miniCtx = miniCanvas.getContext('2d');

        function drawMinimap() {
            miniCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
            miniCtx.fillStyle = 'rgba(15, 70, 15, 0.6)';
            trees.forEach(tree => {
                miniCtx.beginPath();
                miniCtx.arc(tree.x * MAP_SCALE + MAP_CENTER, tree.z * MAP_SCALE + MAP_CENTER, 1.2, 0, Math.PI * 2);
                miniCtx.fill();
            });

            miniCtx.fillStyle = '#00ffcc';
            for (let id in remotePlayers) {
                const p = remotePlayers[id].mesh;
                miniCtx.beginPath();
                miniCtx.arc(p.position.x * MAP_SCALE + MAP_CENTER, p.position.z * MAP_SCALE + MAP_CENTER, 2.0, 0, Math.PI * 2);
                miniCtx.fill();
            }

            const carMapX = car.position.x * MAP_SCALE + MAP_CENTER;
            const carMapZ = car.position.z * MAP_SCALE + MAP_CENTER;
            miniCtx.save();
            miniCtx.translate(carMapX, carMapZ);
            miniCtx.rotate(-car.rotation.y + Math.PI); 
            miniCtx.fillStyle = '#FF0000';
            miniCtx.beginPath();
            miniCtx.moveTo(0, -7); miniCtx.lineTo(4, 4); miniCtx.lineTo(-4, 4);
            miniCtx.closePath(); miniCtx.fill();
            miniCtx.restore();
        }

        // --- 7. KEYBOARD ROUTINES ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { 
            if(!gameActive) return;
            if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; 
        });

        let lastNetworkTick = 0;

        // --- 8. GLOBAL RENDER ANIMATION TICK ---
        function animate(timestamp) {
            requestAnimationFrame(animate);

            if (gameActive) {
                const groundY = getHeight(car.position.x, car.position.z);
                const dirX = Math.sin(rotation);
                const dirZ = Math.cos(rotation);

                const checkDist = 1.5;
                const nextGroundY = getHeight(car.position.x + dirX * checkDist, car.position.z + dirZ * checkDist);
                const slopeGrade = nextGroundY - groundY; 

                const dynamicMaxSpeed = BASE_MAX_SPEED - (slopeGrade * 0.8); 
                let slopeGravityForce = -slopeGrade * 0.008; 
                
                let turnFriction = 0;
                if (Math.abs(speed) > 0.1) {
                    if (keys.a || keys.d) {
                        turnFriction = Math.abs(speed) * 0.015;
                    }
                }

                if (keys.w) {
                    speed += ACCELERATION + slopeGravityForce;
                    if (speed > dynamicMaxSpeed) {
                        speed = THREE.MathUtils.lerp(speed, dynamicMaxSpeed, 0.05);
                    }
                } else if (keys.s) {
                    speed = Math.max(speed - 0.02, -0.4);
                } else {
                    speed *= 0.985;
                    speed += slopeGravityForce;
                }

                if (speed > 0) speed = Math.max(speed - turnFriction, 0);
                if (speed < 0) speed = Math.min(speed + turnFriction, 0);

                if (keys.a) rotation += 0.035 * (speed > 0 ? 1 : -0.5);
                if (keys.d) rotation -= 0.035 * (speed > 0 ? 1 : -0.5);

                car.rotation.y = rotation;
                car.translateZ(speed);

                const wheelSpinDelta = speed * 1.5;
                localCarData.wheels.forEach(w => w.rotation.x += wheelSpinDelta);

                // Tree collisions
                for (let i = 0; i < trees.length; i++) {
                    const tree = trees[i];
                    const dx = car.position.x - tree.x;
                    const dz = car.position.z - tree.z;
                    const distance = Math.sqrt(dx * dx + dz * dz);

                    if (distance < tree.radius) {
                        speed = -speed * 0.4; 
                        const pushX = (dx / distance) * (tree.radius - distance + 0.1);
                        const pushZ = (dz / distance) * (tree.radius - distance + 0.1);
                        car.position.x += pushX;
                        car.position.z += pushZ;
                    }
                }

                // Airborne logic
                const currentVehicleFloor = car.position.y - CAR_HEIGHT_OFFSET;
                let isAirborne = false;

                if (currentVehicleFloor > groundY + 0.1) {
                    verticalVelocity -= GRAVITY;
                    document.getElementById('airtime').style.display = 'inline';
                    isAirborne = true;
                } else {
                    document.getElementById('airtime').style.display = 'none';
                    
                    const launchCheckY = getHeight(car.position.x + dirX * speed, car.position.z + dirZ * speed);
                    const launchDelta = launchCheckY - groundY;

                    if (launchDelta < -1.2 && speed > 0.6) { 
                        verticalVelocity = speed * 0.12; 
                        isAirborne = true;
                    } else {
                        verticalVelocity = 0;
                        car.position.y = groundY + CAR_HEIGHT_OFFSET;
                    }
                }

                car.position.y += verticalVelocity;

                if (car.position.y < groundY + CAR_HEIGHT_OFFSET) {
                    car.position.y = groundY + CAR_HEIGHT_OFFSET;
                    verticalVelocity = 0;
                    isAirborne = false;
                }

                // Slope Pitch
                if (!isAirborne) {
                    const lookDist = 2.0;
                    const frontY = getHeight(car.position.x + dirX * lookDist, car.position.z + dirZ * lookDist);
                    const backY = getHeight(car.position.x - dirX * lookDist, car.position.z - dirZ * lookDist);

                    const pitchAngle = Math.atan2(backY - frontY, lookDist * 2);
                    carChassisContainer.rotation.x = THREE.MathUtils.lerp(carChassisContainer.rotation.x, pitchAngle, 0.15);
                } else {
                    carChassisContainer.rotation.x = THREE.MathUtils.lerp(carChassisContainer.rotation.x, 0, 0.02);
                }

                if (car.position.x > WORLD_SIZE/2) car.position.x = -WORLD_SIZE/2;
                if (car.position.x < -WORLD_SIZE/2) car.position.x = WORLD_SIZE/2;
                if (car.position.z > WORLD_SIZE/2) car.position.z = -WORLD_SIZE/2;
                if (car.position.z < -WORLD_SIZE/2) car.position.z = WORLD_SIZE/2;

                // Push updates to Firebase
                if (window.network && timestamp - lastNetworkTick > 33) {
                    lastNetworkTick = timestamp;
                    window.network.set(window.network.playerRef, {
                        x: car.position.x,
                        y: car.position.y,
                        z: car.position.z,
                        rotY: car.rotation.y,
                        rotX: carChassisContainer.rotation.x,
                        speed: speed,
                        name: playerDisplayName,
                        color: playerSelectedColor // Hex value tracks over network stream smoothly
                    });
                }
            }

            const relativeCameraOffset = new THREE.Vector3(0, 6.0, -15);
            const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
            camera.position.lerp(cameraOffset, 0.08); 
            camera.lookAt(new THREE.Vector3(car.position.x, car.position.y + 0.8, car.position.z));

            // Remote vehicle interpolation
            for (let id in remotePlayers) {
                const pData = remotePlayers[id];
                pData.mesh.position.lerp(pData.targetPosition, 0.15);
                pData.mesh.rotation.y = THREE.MathUtils.lerp(pData.mesh.rotation.y, pData.targetRotationY, 0.15);
                pData.container.rotation.x = THREE.MathUtils.lerp(pData.container.rotation.x, pData.targetRotationX, 0.15);
                
                const remoteWheelSpin = pData.speed * 1.5;
                pData.wheels.forEach(w => w.rotation.x += remoteWheelSpin);
            }

            // --- REVERSE MATH FIXED TO SHOW POSITIVE ---
            const currentMph = Math.round(Math.abs(speed) * 100);
            document.getElementById('speed_digital').innerText = currentMph;

            const gCanvas = document.getElementById('gauge_canvas');
            const gCtx = gCanvas.getContext('2d');
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);

            const speedPct = Math.min(Math.abs(speed) / BASE_MAX_SPEED, 1.2); 
            const centerX = gCanvas.width / 2;
            const centerY = gCanvas.height / 2;
            const radius = 90;
            const startAngle = 0.75 * Math.PI; 
            const endAngle = 2.25 * Math.PI;   
            const dynamicEndAngle = startAngle + (endAngle - startAngle) * Math.min(speedPct, 1.0);

            gCtx.beginPath();
            gCtx.arc(centerX, centerY, radius, startAngle, endAngle);
            gCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            gCtx.lineWidth = 8;
            gCtx.lineCap = 'round';
            gCtx.stroke();

            gCtx.beginPath();
            gCtx.arc(centerX, centerY, radius, startAngle, dynamicEndAngle);
            
            const gradient = gCtx.createLinearGradient(0, centerY + radius, gCanvas.width, centerY);
            gradient.addColorStop(0, '#00bfff'); 
            gradient.addColorStop(0.6, '#ff00ff'); 
            gradient.addColorStop(1, '#ff1133'); 
            
            gCtx.strokeStyle = gradient;
            gCtx.lineWidth = 10;
            gCtx.lineCap = 'round';
            gCtx.shadowBlur = 12;
            gCtx.shadowColor = speedPct > 0.85 ? '#ff1133' : '#00bfff';
            gCtx.stroke();
            gCtx.shadowBlur = 0;

            drawMinimap();
            renderer.render(scene, camera);
        }

        // --- 9. LISTEN FOR NETWORK CLIENT CONNECTIONS ---
        const setupNetworkHooks = setInterval(() => {
            if (window.network) {
                clearInterval(setupNetworkHooks);
                
                const { ref, db, onValue } = window.network;
                const playersRef = ref(db, 'players');
                
                onValue(playersRef, (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;

                    for (let id in data) {
                        if (id === window.network.playerId) continue; 

                        const p = data[id];
                        if (!remotePlayers[id]) {
                            // Spawn multiplayer opponents with their exact custom color wheel selection code synced!
                            const targetColorHex = p.color || "#00ffcc";
                            const newCar = createCarModel(targetColorHex, 0xff1133, p.name || "Opponent");
                            scene.add(newCar.mesh);
                            
                            remotePlayers[id] = {
                                mesh: newCar.mesh,
                                container: newCar.container,
                                wheels: newCar.wheels,
                                targetPosition: new THREE.Vector3(p.x, p.y, p.z),
                                targetRotationY: p.rotY,
                                targetRotationX: p.rotX,
                                speed: p.speed,
                                color: targetColorHex
                            };
                        } else {
                            // Dynamically rebuild opponent vehicle if they swapped paint properties seamlessly
                            if (remotePlayers[id].color !== p.color) {
                                scene.remove(remotePlayers[id].mesh);
                                const updatedColorHex = p.color || "#00ffcc";
                                const remountedCar = createCarModel(updatedColorHex, 0xff1133, p.name || "Opponent");
                                scene.add(remountedCar.mesh);
                                
                                remotePlayers[id].mesh = remountedCar.mesh;
                                remotePlayers[id].container = remountedCar.container;
                                remotePlayers[id].wheels = remountedCar.wheels;
                                remotePlayers[id].color = updatedColorHex;
                            }

                            remotePlayers[id].targetPosition.set(p.x, p.y, p.z);
                            remotePlayers[id].targetRotationY = p.rotY;
                            remotePlayers[id].targetRotationX = p.rotX;
                            remotePlayers[id].speed = p.speed;
                        }
                    }

                    for (let id in remotePlayers) {
                        if (!data[id]) {
                            scene.remove(remotePlayers[id].mesh);
                            delete remotePlayers[id];
                        }
                    }
                });

                animate(0);
            }
        }, 100);

        // --- SIGN IN UI ACTIONS ENGINE ---
        document.getElementById('join_btn').addEventListener('click', () => {
            const inputVal = document.getElementById('username_input').value.trim();
            if(inputVal.length > 0) {
                playerDisplayName = inputVal;
            }
            
            // Capture custom input wheel payload value directly
            playerSelectedColor = document.getElementById('color_wheel').value;
            
            // Re-render local car configuration shell utilizing color wheels value
            scene.remove(car);
            localCarData = createCarModel(playerSelectedColor, 0xffcc00, playerDisplayName);
            car = localCarData.mesh;
            carChassisContainer = localCarData.container;
            scene.add(car);
            car.position.set((Math.random() - 0.5) * 60, 20, (Math.random() - 0.5) * 60);

            document.getElementById('auth_overlay').style.display = 'none';
            gameActive = true;
        });
    </script>
</body>
</html>
