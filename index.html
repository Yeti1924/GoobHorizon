<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Physics Sandbox & Racing Engine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas_container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            z-index: 1;
        }

        /* HUD LAYOUT */
        #hud_container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            box-sizing: border-box;
            padding: 20px;
        }

        .hud-panel {
            position: absolute;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            color: #ffffff;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        #stats_panel {
            top: 20px;
            left: 20px;
            min-width: 180px;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 14px;
        }

        .stat-value {
            color: #00bfff;
        }

        #cash_value {
            color: #2ecc71;
            font-size: 18px;
        }

        /* AIRTIME DISPLAY */
        #airtime {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            animation: pulse 1s infinite alternate;
        }

        #airtime h2 {
            margin: 0;
            color: #f1c40f;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.6);
            letter-spacing: 2px;
        }

        #air_timer {
            font-size: 20px;
            color: #fff;
        }

        /* TELEMETRY GAUGES */
        #gauge_panel {
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        #gauge_canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #speedometer_digital {
            text-align: center;
            z-index: 2;
        }

        #speed_digital {
            font-size: 36px;
            font-weight: 800;
            color: #00bfff;
            line-height: 1;
        }

        .unit {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }

        /* MINIMAP SYSTEM */
        #minimap_panel {
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 200px;
            padding: 0;
            overflow: hidden;
        }

        #minimap_canvas {
            width: 100%;
            height: 100%;
        }

        /* UPGRADES SHOP MENU */
        #shop_panel {
            top: 20px;
            right: 20px;
            width: 260px;
        }

        .shop-title {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
            color: #f1c40f;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            padding: 8px 10px;
            border-radius: 6px;
        }

        .shop-btn {
            background: #2ecc71;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .shop-btn:hover {
            background: #27ae60;
        }

        .shop-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.08); }
        }
    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas_container"></div>

    <div id="hud_container">
        <!-- Dashboard Stats -->
        <div id="stats_panel" class="hud-panel">
            <div class="stat-line">
                <span>BANK:</span>
                <span id="cash_value">$<span id="hud_cash">0</span></span>
            </div>
            <div class="stat-line">
                <span>DRIVER:</span>
                <span class="stat-value" id="driver_name">Player 1</span>
            </div>
        </div>

        <!-- Flying Air Time Dynamic Multiplier Alert -->
        <div id="airtime">
            <h2>BIG AIR!</h2>
            <div id="air_timer">0.0s (x1)</div>
        </div>

        <!-- Shop Upgrades Interface Menu -->
        <div id="shop_panel" class="hud-panel">
            <div class="shop-title">PERFORMANCE MODIFICATIONS</div>
            <div class="shop-item">
                <div>Engine Tune (<span id="lvl_speed">0</span>)</div>
                <button class="shop-btn" id="btn_speed" onclick="buyUpgrade('speed', 150)">$150</button>
            </div>
            <div class="shop-item">
                <div>Racing Tires (<span id="lvl_grip">0</span>)</div>
                <button class="shop-btn" id="btn_grip" onclick="buyUpgrade('grip', 200)">$200</button>
            </div>
        </div>

        <!-- Map Navigation Tracking Visual Radar -->
        <div id="minimap_panel" class="hud-panel">
            <canvas id="minimap_canvas" width="200" height="200"></canvas>
        </div>

        <!-- Telemetry Analog Meter Dials -->
        <div id="gauge_panel" class="hud-panel">
            <canvas id="gauge_canvas" width="180" height="180"></canvas>
            <div id="speedometer_digital">
                <div id="speed_digital">0</div>
                <div class="unit">KM/H</div>
            </div>
        </div>
    </div>

    <script>
        // --- MOTOR GLOBAL CONSTANTS & ENGINE INITIALIZERS ---
        const WORLD_SIZE = 500;
        const BOUNDARY_LIMIT = WORLD_SIZE / 2;
        const MAP_SCALE = 200 / WORLD_SIZE;
        const MAP_CENTER = 100;

        let scene, camera, renderer;
        let car, localCar = { container: null, body: null, wheels: [] };
        let speed = 0, rotation = 0, verticalVelocity = 0;
        let isAirborne = false, airTimeStart = 0, lastMultiplierTick = 0, activeMultiplier = 1;
        
        let playerCash = 100;
        let playerDisplayName = "Player 1";
        let playerSelectedColor = 0x00bfff;
        let gameActive = true;

        let upgradeTiers = { speed: 0, grip: 0 };
        let trees = [];
        let aiDrivers = [];
        let remotePlayers = {}; // Simulated structure for prospective socket streams

        const keys = { w: false, a: false, s: false, d: false };

        // --- PROC-GEN MATHEMATICAL MOUNTAIN HEIGHT PROFILE ---
        function getHeight(x, z) {
            // Evaluates combined mathematical sine frequencies to generate procedural off-road valleys
            let h = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 8;
            h += Math.sin(x * 0.005) * Math.sin(z * 0.008) * 22;
            // Prevent map generation floor values clipping through absolute void base bounds
            return Math.max(h, -5);
        }

        // --- SUB-SYSTEM BOOT INITIALIZATION ROUTINE ---
        function init() {
            const container = document.getElementById('canvas_container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            scene.fog = new THREE.FogExp2(0x0f172a, 0.007);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Ambience Lighting Setups
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfffaed, 0.8);
            sunLight.position.set(100, 150, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 500;
            const d = 200;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            scene.add(sunLight);

            buildTerrain();
            buildAssets();
            spawnPlayerCar();
            spawnAIDrivers();

            // Direct User input listeners
            window.addEventListener('keydown', (e) => handleInput(e, true));
            window.addEventListener('keyup', (e) => handleInput(e, false));
            window.addEventListener('resize', onWindowResize);

            // Perform initial cash readout injection
            document.getElementById('hud_cash').innerText = playerCash;

            // Start loop cycles
            requestAnimationFrame(animate);
        }

        // --- STRUCTURAL PROCEDURAL WORLD GENERATION ---
        function buildTerrain() {
            const segments = 120;
            const geometry = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, segments, segments);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let z = pos.getZ(i);
                pos.setY(i, getHeight(x, z));
            }
            geometry.computeVertexNormals();

            // Segmented Grid coloring rules mapping high coordinates vs low coordinates
            const material = new THREE.MeshStandardMaterial({
                color: 0x27ae60,
                roughness: 0.85,
                metalness: 0.05,
                flatShading: true
            });

            const terrain = new THREE.Mesh(geometry, material);
            terrain.receiveShadow = true;
            scene.add(terrain);
        }

        function buildAssets() {
            // Scatter decorative collision props across global surface bounds
            const treeGeo = new THREE.ConeGeometry(2, 8, 5);
            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 3, 5);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x1e824c, flatShading: true });
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3a21 });

            for(let i = 0; i < 60; i++) {
                const x = (Math.random() - 0.5) * (WORLD_SIZE - 40);
                const z = (Math.random() - 0.5) * (WORLD_SIZE - 40);
                const y = getHeight(x, z);

                const group = new THREE.Group();
                
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 1.5;
                trunk.castShadow = true;
                group.add(trunk);

                const leaves = new THREE.Mesh(treeGeo, leavesMat);
                leaves.position.y = 6;
                leaves.castShadow = true;
                group.add(leaves);

                group.position.set(x, y, z);
                scene.add(group);

                trees.push({ x: x, z: z, radius: 2.2 });
            }
        }

        // --- PLAYER MECHANICAL CONSTRUCT COMPONENT CREATOR ---
        function spawnPlayerCar() {
            localCar.container = new THREE.Group();
            car = new THREE.Group(); // Base positioning entity reference
            
            // Chassis Box Setup
            const bodyGeo = new THREE.BoxGeometry(2.4, 1.0, 4.8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: playerSelectedColor, roughness: 0.2, metalness: 0.8 });
            localCar.body = new THREE.Mesh(bodyGeo, bodyMat);
            localCar.body.position.y = 0.8;
            localCar.body.castShadow = true;
            localCar.container.add(localCar.body);

            // Cockpit Canopy
            const cabinGeo = new THREE.BoxGeometry(1.8, 0.8, 2.2);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, transparent: true, opacity: 0.7 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 1.5, -0.4);
            localCar.container.add(cabin);

            // Assembly Wheels sets
            const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.6, 12);
            wheelGeo.rotateZ(Math.PI / 2);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

            const wheelOffsets = [
                { x: 1.3, y: 0.6, z: 1.5 },   // Front Left
                { x: -1.3, y: 0.6, z: 1.5 },  // Front Right
                { x: 1.3, y: 0.6, z: -1.5 },  // Rear Left
                { x: -1.3, y: 0.6, z: -1.5 }  // Rear Right
            ];

            wheelOffsets.forEach(offset => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.position.set(offset.x, offset.y, offset.z);
                w.castShadow = true;
                localCar.container.add(w);
                localCar.wheels.push(w);
            });

            car.add(localCar.container);
            
            // Setup base coordinate anchors
            car.position.set(0, getHeight(0, 0) + 2, 0);
            scene.add(car);
        }

        // --- AI AGENTS BOT GENERATION POOL ---
        function spawnAIDrivers() {
            const colors = [0xe74c3c, 0x9b59b6, 0xf1c40f, 0xe67e22];
            
            for(let i=0; i<4; i++) {
                const aiGroup = new THREE.Group();
                const aiContainer = new THREE.Group();

                const bGeo = new THREE.BoxGeometry(2.4, 1.0, 4.8);
                const bMat = new THREE.MeshStandardMaterial({ color: colors[i], roughness: 0.4 });
                const body = new THREE.Mesh(bGeo, bMat);
                body.position.y = 0.8;
                aiContainer.add(body);

                // Quick decorative cylinders for AI wheels
                const wGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.6, 8);
                wGeo.rotateZ(Math.PI/2);
                const wMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
                
                let wheelsArr = [];
                [-1.3, 1.3].forEach(wx => {
                    [-1.5, 1.5].forEach(wz => {
                        let w = new THREE.Mesh(wGeo, wMat);
                        w.position.set(wx, 0.6, wz);
                        aiContainer.add(w);
                        wheelsArr.push(w);
                    });
                });

                aiGroup.add(aiContainer);
                aiGroup.position.set((Math.random()-0.5)*150, 10, (Math.random()-0.5)*150);
                scene.add(aiGroup);

                aiDrivers.push({
                    mesh: aiGroup,
                    container: aiContainer,
                    wheels: wheelsArr,
                    speed: 0.4 + Math.random()*0.3,
                    targetX: (Math.random()-0.5)*WORLD_SIZE,
                    targetZ: (Math.random()-0.5)*WORLD_SIZE,
                    rotY: Math.random() * Math.PI * 2
                });
            }
        }

        // --- BUSINESS UPGRADES STORE ENGINE LOGIC ---
        function buyUpgrade(type, cost) {
            if (playerCash >= cost && upgradeTiers[type] < 5) {
                playerCash -= cost;
                upgradeTiers[type]++;
                
                document.getElementById('hud_cash').innerText = playerCash;
                document.getElementById(`lvl_${type}`).innerText = upgradeTiers[type];
                
                // Scale scaling modifier pricing limits
                let newCost = Math.round(cost * 1.6);
                const btn = document.getElementById(`btn_${type}`);
                
                if (upgradeTiers[type] >= 5) {
                    btn.innerText = "MAX";
                    btn.disabled = true;
                } else {
                    btn.innerText = `$${newCost}`;
                    btn.setAttribute('onclick', `buyUpgrade('${type}', ${newCost})`);
                }
            }
        }

        // --- HARDWARE IO CONTROLLERS TRANSLATOR ---
        function handleInput(event, isPressed) {
            switch (event.code) {
                case 'KeyW': case 'ArrowUp': keys.w = isPressed; break;
                case 'KeyA': case 'ArrowLeft': keys.a = isPressed; break;
                case 'KeyS': case 'ArrowDown': keys.s = isPressed; break;
                case 'KeyD': case 'ArrowRight': keys.d = isPressed; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ENGINE TICK ANIMATION LOOP ---
        let lastNetTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);

            if (gameActive) {
                // Adjust performance parameters based on active upgrades
                const maxSpeed = 1.3 + (upgradeTiers.speed * 0.15);
                const turnSpeed = 0.032 + (upgradeTiers.grip * 0.005);

                const groundY = getHeight(car.position.x, car.position.z);
                
                if (keys.w) speed = Math.min(speed + 0.005, maxSpeed);
                else if (keys.s) speed = Math.max(speed - 0.02, -0.5);
                else speed *= 0.98;

                if (keys.a) rotation += turnSpeed * (speed >= 0 ? 1 : -0.6);
                if (keys.d) rotation -= turnSpeed * (speed >= 0 ? 1 : -0.6);

                car.rotation.y = rotation;
                car.translateZ(speed);

                // --- MAP EDGE BARRIER PHYSICS COLLISION DETECTION ---
                if (Math.abs(car.position.x) >= BOUNDARY_LIMIT) {
                    speed = -speed * 0.6; // Reflect kinetic speed vector
                    car.position.x = Math.sign(car.position.x) * (BOUNDARY_LIMIT - 2);
                }
                if (Math.abs(car.position.z) >= BOUNDARY_LIMIT) {
                    speed = -speed * 0.6;
                    car.position.z = Math.sign(car.position.z) * (BOUNDARY_LIMIT - 2);
                }

                // --- 3D SURFACE HILL ROTATION ALIGNMENT ---
                const offsetRadius = 1.5;
                const frontY = getHeight(car.position.x + Math.sin(rotation)*offsetRadius, car.position.z + Math.cos(rotation)*offsetRadius);
                const backY = getHeight(car.position.x - Math.sin(rotation)*offsetRadius, car.position.z - Math.cos(rotation)*offsetRadius);
                const leftY = getHeight(car.position.x + Math.sin(rotation + Math.PI/2)*offsetRadius, car.position.z + Math.cos(rotation + Math.PI/2)*offsetRadius);
                const rightY = getHeight(car.position.x + Math.sin(rotation - Math.PI/2)*offsetRadius, car.position.z + Math.cos(rotation - Math.PI/2)*offsetRadius);

                // Map pitch and roll terrain slopes
                const pitchAngle = Math.atan2(backY - frontY, offsetRadius * 2);
                const rollAngle = Math.atan2(leftY - rightY, offsetRadius * 2);

                // Handle gravity & airborne mechanics
                if (car.position.y > groundY + 0.2) {
                    verticalVelocity -= 0.008;
                    
                    if (!isAirborne) {
                        isAirborne = true;
                        airTimeStart = Date.now();
                        lastMultiplierTick = airTimeStart;
                        activeMultiplier = 1;
                        playerCash += 20; 
                    }

                    const totalAirTimeSeconds = (Date.now() - airTimeStart) / 1000;
                    
                    // MODIFIED: Changed tracking interval check from 5000ms to 1000ms (1 second)
                    if (Date.now() - lastMultiplierTick >= 1000) {
                        activeMultiplier += 1;
                        playerCash *= activeMultiplier; 
                        lastMultiplierTick = Date.now();
                    }

                    document.getElementById('airtime').style.display = 'block';
                    document.getElementById('air_timer').innerText = `${totalAirTimeSeconds.toFixed(1)}s (x${activeMultiplier})`;

                } else {
                    isAirborne = false;
                    document.getElementById('airtime').style.display = 'none';
                    
                    if (frontY - groundY < -1.5 && speed > 0.9) {
                        verticalVelocity = speed * 0.15;
                    } else {
                        verticalVelocity = 0;
                        car.position.y = groundY;
                    }
                }
                car.position.y += verticalVelocity;

                // Smoothly update terrain tracking containers
                localCar.container.rotation.x = THREE.MathUtils.lerp(localCar.container.rotation.x, pitchAngle, 0.2);
                localCar.container.rotation.z = THREE.MathUtils.lerp(localCar.container.rotation.z, rollAngle, 0.2);

                localCar.wheels.forEach(w => w.rotation.x += speed * 1.2);
                document.getElementById('hud_cash').innerText = playerCash;

                // Tree Boundaries
                trees.forEach(t => {
                    let d = Math.hypot(car.position.x - t.x, car.position.z - t.z);
                    if(d < t.radius) {
                        speed = -speed * 0.5;
                        car.position.x += ((car.position.x - t.x)/d) * 0.5;
                    }
                });

                // --- AI AGENT INTELLIGENT SIMULATION ---
                aiDrivers.forEach(ai => {
                    let aiGroundY = getHeight(ai.mesh.position.x, ai.mesh.position.z);
                    let dx = ai.targetX - ai.mesh.position.x;
                    let dz = ai.targetZ - ai.mesh.position.z;
                    let dist = Math.hypot(dx, dz);

                    if(dist < 20 || Math.abs(ai.mesh.position.x) >= BOUNDARY_LIMIT || Math.abs(ai.mesh.position.z) >= BOUNDARY_LIMIT) {
                        ai.targetX = (Math.random()-0.5)*(WORLD_SIZE - 60);
                        ai.targetZ = (Math.random()-0.5)*(WORLD_SIZE - 60);
                    }

                    let targetRot = Math.atan2(dx, dz);
                    let diff = targetRot - ai.rotY;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    ai.rotY += Math.sign(diff) * 0.02;

                    ai.mesh.rotation.y = ai.rotY;
                    ai.mesh.translateZ(ai.speed);
                    ai.mesh.position.y = aiGroundY;

                    // AI Terrain Alignment
                    let aiF = getHeight(ai.mesh.position.x + Math.sin(ai.rotY)*1.5, ai.mesh.position.z + Math.cos(ai.rotY)*1.5);
                    let aiB = getHeight(ai.mesh.position.x - Math.sin(ai.rotY)*1.5, ai.mesh.position.z - Math.cos(ai.rotY)*1.5);
                    ai.container.rotation.x = Math.atan2(aiB - aiF, 3.0);

                    ai.wheels.forEach(w => w.rotation.x += ai.speed);
                });

                // Network snapshot sync stream placeholder setup
                if (window.network && time - lastNetTime > 40) {
                    lastNetTime = time;
                    window.network.set(window.network.playerRef, {
                        x: car.position.x, y: car.position.y, z: car.position.z,
                        rotY: rotation, rotX: localCar.container.rotation.x, rotZ: localCar.container.rotation.z,
                        speed: speed, name: playerDisplayName, color: playerSelectedColor
                    });
                }
            }

            // Camera Tracking
            let camOffset = new THREE.Vector3(0, 5.5, -13).applyMatrix4(car.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(new THREE.Vector3(car.position.x, car.position.y + 0.5, car.position.z));

            // HUD Gauges Renderer Engine
            document.getElementById('speed_digital').innerText = Math.round(Math.abs(speed) * 95);
            const gCtx = document.getElementById('gauge_canvas').getContext('2d');
            gCtx.clearRect(0,0,180,180);
            gCtx.beginPath(); gCtx.arc(90, 90, 75, 0.75*Math.PI, 2.25*Math.PI);
            gCtx.strokeStyle = 'rgba(255,255,255,0.1)'; gCtx.lineWidth = 6; gCtx.stroke();
            
            gCtx.beginPath();
            let pEnd = 0.75*Math.PI + (1.5*Math.PI)*Math.min(Math.abs(speed)/2, 1.0);
            gCtx.arc(90, 90, 75, 0.75*Math.PI, pEnd);
            gCtx.strokeStyle = '#00bfff'; gCtx.lineWidth = 8; gCtx.stroke();

            // Minimap Draw Engine
            const mCtx = document.getElementById('minimap_canvas').getContext('2d');
            mCtx.clearRect(0,0,200,200);
            mCtx.fillStyle = 'rgba(255,255,255,0.2)';
            aiDrivers.forEach(ai => mCtx.fillRect(ai.mesh.position.x*MAP_SCALE+MAP_CENTER, ai.mesh.position.z*MAP_SCALE+MAP_CENTER, 3, 3));
            mCtx.fillStyle = '#ff00ff';
            mCtx.fillRect(car.position.x*MAP_SCALE+MAP_CENTER, car.position.z*MAP_SCALE+MAP_CENTER, 5, 5);

            renderer.render(scene, camera);
        }

        // Initialize script trigger setup
        window.onload = init;
    </script>
</body>
</html>
